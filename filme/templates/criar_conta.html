{% extends "base.html" %} {% block title %}Login{% endblock %}
<!-- prettier-ignore -->
{% load static %} {% load crispy_forms_tags %}
<!-- prettier-ignore -->
{%block head%} {% endblock %}
<!-- prettier-ignore -->
{% block content %}
<header
  class="min-h-screen bg-black/70 bg-blend-multiply showcase border-gray-600 border-b-8 flex justify-center items-center bg-no-repeat"
  style="
    background-image: url(&quot;{% static 'images/background_netflix.jpg' %}&quot;);
  "
>
  <div
    class="z-10 h-full py-32 md:py-0 text-gray-100 text-center flex items-center flex-col"
  >
    <form method="post">
      <fieldset class="form-group">
        <legend class="border-bottom mb-4">
          Crie uma conta para continuar
        </legend>
        {% csrf_token %} {{form|crispy}}
      </fieldset>
      <button
        class="bg-primary_red py-1 px-3 text-white w-full md:text-lg rounded-md bg-red-600"
        type="submit"
      >
        Criar Conta
      </button>
    </form>
  </div>
</header>
{% endblock %}
