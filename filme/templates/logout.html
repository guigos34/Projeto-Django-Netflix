{% extends "base.html" %} {% block title %}Logout{% endblock %}
<!-- prettier-ignore -->
{% load static %}
<!-- prettier-ignore -->
{%block head%} {% endblock %}
<!-- prettier-ignore -->
{% block content %}
<header
  class="min-h-screen bg-black/70 bg-blend-multiply showcase border-gray-600 border-b-8 flex justify-center items-center bg-no-repeat bg-cover bg-center"
  style="
    background-image: url(&quot;{% static 'images/background_netflix.jpg' %}&quot;);
  "
>
  <div
    class="z-10 h-full py-32 md:py-0 text-gray-100 text-center flex items-center flex-col"
  >
    <h2 class="text-2xl font-semibold">Você saiu da sua conta</h2>
    <div class="flex flex-nowrap justify-center space-x-5 p-5">
      <a href="{% url 'filme:login' %}"
        ><button
          class="bg-primary_red py-1 px-3 text-white md:text-lg rounded-md bg-red-600"
        >
          Fazer Login
        </button></a
      >
      <a href="{% url 'filme:criar_conta' %}"
        ><button
          class="bg-primary_red py-1 px-3 text-white md:text-lg rounded-md bg-red-600"
        >
          Criar uma Conta
        </button></a
      >
    </div>
  </div>
</header>
{% endblock %}
