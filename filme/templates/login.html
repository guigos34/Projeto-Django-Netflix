{% extends "base.html" %} {% block title %}Login{% endblock %}
<!-- prettier-ignore -->
{% load static %} {% load crispy_forms_tags %}
<!-- prettier-ignore -->
{%block head%} {% endblock %}
<!-- prettier-ignore -->
{% block content %}
<header
  class="min-h-screen bg-black/70 bg-blend-multiply showcase border-gray-600 border-b-8 flex justify-center items-center bg-no-repeat bg-cover bg-center"
  style="
    background-image: url(&quot;{% static 'images/background_netflix.jpg' %}&quot;);
  "
>
  <div
    class="z-10 h-full py-32 md:py-0 text-gray-100 text-center flex items-center flex-col"
  >
    <form method="post">
      <fieldset class="form-group">
        <legend class="border-bottom mb-4">Faça Login para continuar</legend>
        {% csrf_token %} {{form|crispy}}
      </fieldset>

      <button
        class="bg-primary_red py-1 my-2 px-3 w-full text-white md:text-lg rounded-md bg-red-600"
        type="submit"
      >
        Fazer Login
      </button>
    </form>
    <small>
      Não tem uma conta ainda?
      <p>
        <a href="{% url 'filme:criar_conta' %}"
          >Clique aqui para criar uma conta</a
        >
      </p>
    </small>
  </div>
</header>
{% endblock %}
